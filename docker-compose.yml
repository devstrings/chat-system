version: '3.8'

services:
  # Backend Service
  backend:
    build: ./backend
    container_name: chat_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://host.docker.internal:27017/chat-system
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - JWT_SECRET=your_super_secret_jwt_key_change_this
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"  
    networks:
      - chat_network
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads

  # Frontend Service
  frontend:
    build: ./chat-dashboard
    container_name: chat_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - chat_network
    volumes:
      - ./chat-dashboard:/app
      - /app/node_modules
    stdin_open: true
    tty: true

networks:
  chat_network:
    driver: bridge