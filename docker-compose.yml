version: '3.8'

services:
  # Backend Service
  backend:
    build: ./backend
    container_name: chat_backend
    restart: always
    ports:
      - "${BACKEND_HOST_PORT}:${BACKEND_CONTAINER_PORT}"
    environment:
      - NODE_ENV=${NODE_ENV}
      - BACKEND_URL=${BACKEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=${BACKEND_CONTAINER_PORT}
      - TURN_SERVER=turn:${COTURN_REALM}:${COTURN_PORT}
      - TURN_USERNAME=${COTURN_USER}
      - TURN_PASSWORD=${COTURN_PASSWORD}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chat_network
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      - coturn

  # Frontend Service
  frontend:
    build: ./chat-dashboard
    container_name: chat_frontend
    restart: always
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_CONTAINER_PORT}"
    environment:
      - VITE_API_URL=${BACKEND_URL}
      - VITE_SOCKET_URL=${BACKEND_URL}
      - VITE_TURN_SERVER=turn:${COTURN_REALM}:${COTURN_PORT}
      - VITE_TURN_USERNAME=${COTURN_USER}
      - VITE_TURN_PASSWORD=${COTURN_PASSWORD}
    depends_on:
      - backend
    networks:
      - chat_network
    stdin_open: true
    tty: true

  # Coturn TURN Server
  coturn:
    image: coturn/coturn:latest
    container_name: chat_coturn
    restart: always
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "49152-49200:49152-49200/udp"
    command: >
      -n
      --log-file=stdout
      --min-port=49152
      --max-port=49200
      --realm=${COTURN_REALM}
      --user=${COTURN_USER}:${COTURN_PASSWORD}
      --lt-cred-mech
      --fingerprint
      --no-multicast-peers
      --no-cli
      --no-tls
      --no-dtls
      --listening-ip=${COTURN_LISTEN_IP}
      --external-ip=${COTURN_EXTERNAL_IP}
      --allow-loopback-peers
    networks:
      - chat_network

networks:
  chat_network:
    driver: bridge