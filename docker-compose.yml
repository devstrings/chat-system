version: '3.8'

services:
  # Backend Service
  backend:
    build: ./backend
    container_name: chat_backend
    restart: always
    ports:
      - "${BACKEND_HOST_PORT}:${BACKEND_CONTAINER_PORT}"
    environment:
      - NODE_ENV=${NODE_ENV}
      - BACKEND_URL=${BACKEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=${BACKEND_CONTAINER_PORT}
      - TURN_SERVER=turn:${COTURN_REALM}:${COTURN_PORT}
      - TURN_USERNAME=${COTURN_USER}
      - TURN_PASSWORD=${COTURN_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chat_network
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      - coturn

  # Frontend Service
  frontend:
    build: ./chat-dashboard
    container_name: chat_frontend
    restart: always
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_CONTAINER_PORT}"
    environment:
      - VITE_API_URL=${BACKEND_URL}
      - VITE_SOCKET_URL=${BACKEND_URL}
      - VITE_TURN_SERVER=turn:${COTURN_REALM}:${COTURN_PORT}
      - VITE_TURN_USERNAME=${COTURN_USER}
      - VITE_TURN_PASSWORD=${COTURN_PASSWORD}
    depends_on:
      - backend
    networks:
      - chat_network
    stdin_open: true
    tty: true

  # Coturn TURN Server
  coturn:
    image: coturn/coturn:latest
    container_name: chat_coturn
    restart: always
    ports:
      # TURN/STUN standard ports
      - "${COTURN_PORT}:${COTURN_CONTAINER_PORT}/tcp"
      - "${COTURN_PORT}:${COTURN_CONTAINER_PORT}/udp"

      # TURN over TLS (optional if you enable TLS later)
      - "${COTURN_TLS_PORT}:${COTURN_CONTAINER_TLS_PORT}/tcp"
      - "${COTURN_TLS_PORT}:${COTURN_CONTAINER_TLS_PORT}/udp"
      
      # Relay ports (VERY IMPORTANT for WebRTC)
      # "49152-49200:49152-49200/udp"
      - "${COTURN_RELAY_PORT_START}-${COTURN_RELAY_PORT_END}:${COTURN_CONTAINER_RELAY_PORT_START}-${COTURN_CONTAINER_RELAY_PORT_END}/udp"
    
    command: >
      -n
      --log-file=stdout
      --min-port=${COTURN_CONTAINER_RELAY_PORT_START}
      --max-port=${COTURN_CONTAINER_RELAY_PORT_END}
      --realm=${COTURN_REALM}
      --user=${COTURN_USER}:${COTURN_PASSWORD}
      --lt-cred-mech
      --fingerprint
      --no-multicast-peers
      --no-cli
      --no-tls
      --no-dtls
      --listening-ip=${COTURN_LISTEN_IP}
      --external-ip=${COTURN_EXTERNAL_IP}
      --allow-loopback-peers
    networks:
      - chat_network

networks:
  chat_network:
    driver: bridge